version: '3.8'

services:
  db:
    image: postgres:17
    container_name: postgres_container_booking_app
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: postgres
      POSTGRES_DB: booking_app
    volumes:
      - db_data_booking:/var/lib/postgresql/data
      - ./db-init-scripts:/docker-entrypoint-initdb.d
    networks:
      - booking_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: booking_pgadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: peto7724@gmail.com
      PGADMIN_DEFAULT_PASSWORD: root
    networks:
      - booking_network

  app:
    build: .
    container_name: springboot_booking_app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # DATABASE
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/booking_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # EMAIL
      MAIL_USERNAME: test@gloziksoft.sk
      MAIL_PASSWORD: Baxe32kh754!

      # SERVER
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080

      # APP INFO
      SPRING_APPLICATION_NAME: BookingApp
    networks:
      - booking_network

volumes:
  db_data_booking:

networks:
  booking_network:
    driver: bridge

