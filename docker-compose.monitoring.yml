services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor

    command:
      - "-logtostderr"
      - "-docker_only=true"
      - "-housekeeping_interval=30s"
      - "-disable_metrics=advtcp,cpu_topology,cpuset,disk,diskIO,memory_numa,sched"

    ports:
      - "8081:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    privileged: true

    mem_limit: 128m
    cpus: "0.30"

    restart: unless-stopped

    networks:
      - booking_network

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - /opt/booking-easyapp/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"

    mem_limit: 192m
    cpus: "0.50"

    restart: unless-stopped

    networks:
      - booking_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      GF_SERVER_ROOT_URL: https://bookingapp.gloziksoft.sk/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

    volumes:
      - booking-easyapp_grafana_data:/var/lib/grafana

    mem_limit: 192m
    cpus: "0.50"

    restart: unless-stopped

    networks:
      - booking_network

networks:
  booking_network:
    external: true

volumes:
  prometheus_data:

  booking-easyapp_grafana_data:
    external: true
