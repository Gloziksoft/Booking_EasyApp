services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8081:8080"
    mem_limit: 200m
    cpus: 0.3
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    privileged: true
    restart: unless-stopped
    networks:
      - booking_network

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    mem_limit: 256m
    cpus: 0.3
    volumes:
      - /opt/booking-easyapp/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - booking_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    mem_limit: 128m
    cpus: 0.2
    environment:
      GF_SERVER_ROOT_URL: https://bookingapp.gloziksoft.sk/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - booking-easyapp_grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - booking_network

# 🔥 DÔLEŽITÉ — toto ti chýbalo
volumes:
  prometheus_data:
  booking-easyapp_grafana_data:
    external: true

networks:
  booking_network:
    external: true